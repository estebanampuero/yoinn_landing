<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoinn – Abriendo actividad...</title>

    <!-- Open Graph (preview en WhatsApp, iMessage, IG) -->
    <meta property="og:title"       content="Te invitaron a un Yoinn 🎉" />
    <meta property="og:description" content="Únete a la actividad. Descarga Yoinn para verla." />
    <meta property="og:image"       content="https://www.yoinn.cl/1.png" />
    <meta property="og:url"         content="https://www.yoinn.cl" />
    <meta property="og:type"        content="website" />
    <meta name="twitter:card"       content="summary_large_image" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0D0D0D;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
        }
        .blob-1 { width: 350px; height: 350px; background: #00BCD4; top: -80px; left: -80px; }
        .blob-2 { width: 280px; height: 280px; background: #7B2FBE; bottom: -60px; right: -60px; }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 44px 32px 36px;
            width: 320px;
            max-width: 90vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 76px; height: 76px;
            border-radius: 18px;
            margin-bottom: 22px;
            animation: pulse 2s infinite ease-in-out;
            box-shadow: 0 12px 28px rgba(0,188,212,0.25);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(0.96); }
            50%       { transform: scale(1.04); }
        }

        h2 {
            color: #fff;
            font-size: 21px;
            font-weight: 800;
            letter-spacing: -0.4px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* IAB warning banner */
        .iab-banner {
            background: rgba(0,188,212,0.12);
            border: 1px solid rgba(0,188,212,0.28);
            border-radius: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            line-height: 1.55;
            margin-bottom: 20px;
            width: 100%;
            text-align: left;
            display: none;
        }
        .iab-banner strong { color: #00E5FF; }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(0,188,212,0.25);
            border-top-color: #00BCD4;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-bottom: 28px;
            min-height: 18px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            transition: transform 0.15s ease, opacity 0.15s ease;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        .btn-primary  { background: linear-gradient(135deg,#00E5FF,#0097A7); color: #000; }
        .btn-secondary {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            font-weight: 500;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 0;
        }
        .btn-secondary:active { opacity: 0.6; }

        /* Hidden until needed */
        #actions { display: none; width: 100%; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <img src="/logo.png" alt="Yoinn" class="logo"
             onerror="this.style.display='none'">

        <!-- IAB warning — shown only in Instagram / Facebook in-app browser -->
        <div class="iab-banner" id="iab-banner">
            <strong>Para abrir Yoinn</strong>, toca los <strong>3 puntos ···</strong>
            arriba y elige <strong>"Abrir en Safari"</strong> o
            <strong>"Abrir en Chrome"</strong>.
        </div>

        <h2>Te invitaron a un Yoinn</h2>
        <p class="subtitle">Abriendo la app...<br>Si no tienes Yoinn, descárgala gratis.</p>

        <div class="spinner" id="spinner"></div>
        <p class="status" id="status">Verificando si tienes la app...</p>

        <div id="actions">
            <a id="store-btn" href="#" class="btn btn-primary">Descargar Yoinn</a>
            <a id="open-btn"  href="#" class="btn btn-secondary">Ya la tengo → Abrir actividad</a>
        </div>
    </div>

    <script>
        (function () {
            var ua        = navigator.userAgent || '';
            var isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            var isAndroid = /android/i.test(ua);

            // ── In-app browser detection ──────────────────────────────────────
            var isInstagram    = /Instagram/.test(ua);
            var isFacebook     = /FBAN|FBAV/.test(ua);
            var isInAppBrowser = isInstagram || isFacebook;

            if (isInAppBrowser) {
                document.getElementById('iab-banner').style.display = 'block';
            }

            // ── Store URLs ────────────────────────────────────────────────────
            var androidStore = 'https://play.google.com/store/apps/details?id=cl.yoinn.social';
            var iosStore     = 'https://apps.apple.com/cl/app/id6756730755';
            var storeLink    = isIOS ? iosStore : isAndroid ? androidStore : 'https://www.yoinn.cl';

            // ── Extract activityId ────────────────────────────────────────────
            // This page is served for /invite/{id} (and optionally /activity/{id}).
            // Both prefixes map to the same activity; we only need the last segment.
            var parts      = window.location.pathname.split('/').filter(Boolean);
            // parts[0] = 'invite' or 'activity', parts[1] = activityId
            var activityId = (parts.length >= 2) ? parts[1] : null;

            // ── Deep links ────────────────────────────────────────────────────
            var customScheme = activityId
                ? 'yoinn://activity/' + activityId
                : 'yoinn://home';

            // intent:// gives Android native resolution with built-in Play Store
            // fallback — more reliable than custom scheme in Chrome/Samsung/WebView.
            var intentUrl = activityId
                ? 'intent://activity/' + activityId +
                  '#Intent;scheme=yoinn;package=cl.yoinn.social' +
                  ';S.browser_fallback_url=' + encodeURIComponent(androidStore) + ';end'
                : androidStore;

            // ── DOM refs ──────────────────────────────────────────────────────
            var storeBtn = document.getElementById('store-btn');
            var openBtn  = document.getElementById('open-btn');
            var actions  = document.getElementById('actions');
            var status   = document.getElementById('status');
            var spinner  = document.getElementById('spinner');

            storeBtn.href      = storeLink;
            storeBtn.innerText = isIOS     ? 'Descargar en App Store'
                               : isAndroid ? 'Descargar en Google Play'
                               :             'Ir al sitio web';

            // The "I already have it" button uses the best available scheme per platform
            openBtn.href = isAndroid ? intentUrl : customScheme;

            function showFallback(msg) {
                spinner.style.display = 'none';
                status.innerText = msg || '';
                actions.style.display = 'block';
            }

            // ── Redirect logic ────────────────────────────────────────────────
            if (isInAppBrowser) {
                // Universal Links / App Links do NOT fire in Instagram/Facebook IABs.
                // Show the manual UI immediately with the IAB banner already visible.
                showFallback('');

            } else if (isAndroid) {
                // intent:// is resolved natively by Android: opens the app if installed,
                // otherwise fires browser_fallback_url to Play Store automatically.
                // Still show manual UI after a timeout for browsers that block intents
                // (e.g. some Samsung Internet versions).
                status.innerText = 'Intentando abrir Yoinn...';
                window.location.href = intentUrl;
                setTimeout(function () { showFallback('No encontramos la app instalada.'); }, 2500);

            } else if (isIOS) {
                // Detect app open via page-visibility: when the app takes focus
                // the Safari tab goes to background → document.hidden = true.
                var appOpened = false;
                document.addEventListener('visibilitychange', function () {
                    if (document.hidden) appOpened = true;
                });
                window.addEventListener('pagehide', function () { appOpened = true; });
                window.addEventListener('blur',     function () { appOpened = true; });

                status.innerText = 'Intentando abrir Yoinn...';
                window.location.href = customScheme;

                setTimeout(function () {
                    if (!appOpened) showFallback('No encontramos la app instalada.');
                }, 2500);

            } else {
                // Desktop — show download options directly
                showFallback('Abre este link desde tu celular.');
            }
        })();
    </script>
</body>
</html>
