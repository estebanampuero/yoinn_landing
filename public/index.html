<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOINN - Social Discovery App</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { cyan: '#00BCD4', dark: '#0F172A', light: '#F0F8FA', accent: '#38BDF8' }
                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    animation: {
                        'float':          'float 6s ease-in-out infinite',
                        'float-delayed':  'float 7s ease-in-out 2s infinite',
                        'float-slow':     'float 8s ease-in-out 1s infinite',
                        'float-fast':     'float 5s ease-in-out 0.5s infinite',
                        'float-reverse':  'floatReverse 7s ease-in-out 1.5s infinite',
                        'float-jiggle':   'floatJiggle 6s ease-in-out 0.8s infinite',
                        'fade-in-up':     'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow':     'pulseGlow 4s infinite',
                    },
                    keyframes: {
                        float:       { '0%, 100%': { transform: 'translateY(0)' },  '50%': { transform: 'translateY(-15px)' } },
                        floatReverse:{ '0%, 100%': { transform: 'translateY(0)' },  '50%': { transform: 'translateY(15px)' } },
                        floatJiggle: { '0%, 100%': { transform: 'translateY(0) rotate(0deg)' }, '50%': { transform: 'translateY(-10px) rotate(2deg)' } },
                        fadeInUp:    { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        pulseGlow:   { '0%, 100%': { opacity: '0.4', transform: 'scale(1)' }, '50%': { opacity: '0.7', transform: 'scale(1.05)' } },
                    }
                }
            }
        }
    </script>

    <!-- Deep link redirect -->
    <script>
        window.onload = function () {
            var path = window.location.pathname;
            if (path.includes('/activity/')) {
                var ua = navigator.userAgent || navigator.vendor || window.opera;
                if (/android/i.test(ua)) {
                    window.location.href = 'https://play.google.com/store/apps/details?id=cl.yoinn.social';
                } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                    window.location.href = 'https://apps.apple.com/app/yoinn/id6756730755';
                }
            }
        };
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 overflow-x-hidden selection:bg-brand-cyan selection:text-white">

    <!-- Background layers -->
    <div class="fixed inset-0 bg-landscape z-[-2]"></div>
    <div class="fixed inset-0 bg-gradient-to-br from-white/90 via-white/80 to-brand-light/90 z-[-1] backdrop-blur-[4px]"></div>

    <main class="min-h-screen flex flex-col relative">
        <div id="nav-root"></div>
        <div id="hero-root"></div>
        <div id="features-root"></div>
        <div id="footer-root"></div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
